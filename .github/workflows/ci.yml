name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  operator-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go mod tidy
      - run: go build ./...
      - run: go vet ./...

  sidecar-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sidecar
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go mod tidy
      - run: go build ./...
      - run: go vet ./...

  rego-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: open-policy-agent/setup-opa@v2
        with:
          version: latest
      - run: opa test policies/rego -v

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint charts/ai-workload-controller


  kind-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: |
          curl -Lo kind "https://kind.sigs.k8s.io/dl/v0.20.0/kind-linux-amd64"
          chmod +x kind
          sudo mv kind /usr/local/bin/kind
      - uses: azure/setup-kubectl@v4
      - uses: azure/setup-helm@v4
      - run: kind create cluster --name kubesentinel-ci
      - run: |
          go mod tidy
          cd sidecar && go mod tidy
          cd ..
          docker build -t ai-workload-controller:dev .
          docker build -t semantic-guardrail:dev ./sidecar
          kind load docker-image ai-workload-controller:dev --name kubesentinel-ci
          kind load docker-image semantic-guardrail:dev --name kubesentinel-ci
      - run: kubectl apply -f config/crd/bases/
      - run: |
          helm install ai-workload-controller charts/ai-workload-controller \
            -n ai-security --create-namespace \
            --set image.repository=ai-workload-controller \
            --set image.tag=dev \
            --set image.pullPolicy=Never \
            --set webhook.enabled=false
      - run: |
          kubectl create namespace ai-agents || true
          kubectl apply -f config/samples/aipolicy_sample.yaml
          kubectl apply -f config/samples/semanticbudget_sample.yaml
      - run: |
          python - <<'PY'
          from pathlib import Path
          from textwrap import dedent

          content = dedent('''
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: test-agent
            namespace: ai-agents
            labels:
              workload-type: ai-agent
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: test-agent
            template:
              metadata:
                labels:
                  app: test-agent
                  workload-type: ai-agent
              spec:
                containers:
                  - name: agent
                    image: nginx:alpine
                    ports:
                      - containerPort: 80
                  - name: semantic-guardrail
                    image: semantic-guardrail:dev
                    imagePullPolicy: Never
                    ports:
                      - containerPort: 9090
                    env:
                      - name: RUNTIME_AGGREGATOR_URL
                        value: "http://ai-workload-controller.ai-security:9443/v1/verdicts"
          ''')

          Path('/tmp/test-agent.yaml').write_text(content)
          PY
          kubectl apply -f /tmp/test-agent.yaml
      - run: |
          # Allow more time for images to be pulled and containers to start in CI
          kubectl -n ai-agents rollout status deploy/test-agent --timeout=300s || true
          kubectl -n ai-agents wait --for=condition=available deployment/test-agent --timeout=300s || true
      - run: |
          echo "Gathering pod diagnostics for troubleshooting"
          kubectl -n ai-agents get pods -o wide
          POD_NAME=$(kubectl -n ai-agents get pod -l app=test-agent -o jsonpath='{.items[0].metadata.name}')
          echo "Pod name: $POD_NAME"
          kubectl -n ai-agents describe pod $POD_NAME || true
          echo "semantic-guardrail logs (last 200 lines):"
          kubectl -n ai-agents logs $POD_NAME -c semantic-guardrail --tail=200 || true
          echo "agent container logs (last 200 lines):"
          kubectl -n ai-agents logs $POD_NAME -c agent --tail=200 || true
          POD_IP=$(kubectl -n ai-agents get pod -l app=test-agent -o jsonpath='{.items[0].status.podIP}')
          echo "POD_IP=$POD_IP"
          echo "Attempting health check inside the semantic-guardrail container"
          kubectl exec -n ai-agents "$POD_NAME" -c semantic-guardrail -- curl -fS http://127.0.0.1:9090/healthz
      - run: |
          kubectl -n ai-agents get aipolicy support-agent-policy -o jsonpath='{.status.conditions[?(@.type=="Accepted")].status}' || true
