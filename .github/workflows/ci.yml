name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  operator-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go mod tidy
      - run: go build ./...
      - run: go vet ./...

  sidecar-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sidecar
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go mod tidy
      - run: go build ./...
      - run: go vet ./...

  rego-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: open-policy-agent/setup-opa@v2
        with:
          version: latest
      - run: opa test policies/rego -v

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint charts/ai-workload-controller


  kind-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: engineerd/setup-kind@v0.6.2
      - uses: azure/setup-kubectl@v4
      - uses: azure/setup-helm@v4
      - run: kind create cluster --name kubesentinel-ci
      - run: |
          go mod tidy
          cd sidecar && go mod tidy
          cd ..
          docker build -t ai-workload-controller:dev .
          docker build -t semantic-guardrail:dev ./sidecar
          kind load docker-image ai-workload-controller:dev --name kubesentinel-ci
          kind load docker-image semantic-guardrail:dev --name kubesentinel-ci
      - run: kubectl apply -f config/crd/bases/
      - run: |
          helm install ai-workload-controller charts/ai-workload-controller \
            -n ai-security --create-namespace \
            --set image.repository=ai-workload-controller \
            --set image.tag=dev \
            --set image.pullPolicy=Never \
            --set webhook.enabled=false
      - run: |
          kubectl create namespace ai-agents || true
          kubectl apply -f config/samples/aipolicy_sample.yaml
          kubectl apply -f config/samples/semanticbudget_sample.yaml
      - run: |
          python - <<'PY'
          from pathlib import Path
          from textwrap import dedent

          content = dedent('''
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: test-agent
            namespace: ai-agents
            labels:
              workload-type: ai-agent
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: test-agent
            template:
              metadata:
                labels:
                  app: test-agent
                  workload-type: ai-agent
              spec:
                containers:
                  - name: agent
                    image: nginx:alpine
                    ports:
                      - containerPort: 80
                  - name: semantic-guardrail
                    image: semantic-guardrail:dev
                    imagePullPolicy: Never
                    ports:
                      - containerPort: 9090
                    env:
                      - name: RUNTIME_AGGREGATOR_URL
                        value: "http://ai-workload-controller.ai-security:9443/v1/verdicts"
          ''')

          Path('/tmp/test-agent.yaml').write_text(content)
          PY
          kubectl apply -f /tmp/test-agent.yaml
      - run: |
          kubectl -n ai-agents rollout status deploy/test-agent --timeout=120s
          kubectl -n ai-agents wait --for=condition=available deployment/test-agent --timeout=120s
      - run: |
          POD_IP=$(kubectl -n ai-agents get pod -l app=test-agent -o jsonpath='{.items[0].status.podIP}')
          kubectl -n ai-agents run --rm -i curl-test --restart=Never --image=curlimages/curl:8.0.1 -- /bin/sh -c "curl -fS http://$POD_IP:9090/healthz"
      - run: |
          kubectl -n ai-agents get aipolicy support-agent-policy -o jsonpath='{.status.conditions[?(@.type=="Accepted")].status}'
