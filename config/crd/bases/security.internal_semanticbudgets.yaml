apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: semanticbudgets.security.internal
spec:
  group: security.internal
  names:
    kind: SemanticBudget
    listKind: SemanticBudgetList
    plural: semanticbudgets
    singular: semanticbudget
    shortNames:
      - sembud
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: MaxHighRisk/hr
          type: integer
          jsonPath: .spec.maxHighRiskActionsPerHour
        - name: Current
          type: integer
          jsonPath: .status.currentHighRiskActions
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [maxHighRiskActionsPerHour]
              properties:
                identity:
                  type: string
                selector:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                maxHighRiskActionsPerHour:
                  type: integer
                  minimum: 0
                maxTotalActionsPerHour:
                  type: integer
                  minimum: 0
                quarantineOnBudgetExceeded:
                  type: boolean
            status:
              type: object
              properties:
                currentHighRiskActions:
                  type: integer
                windowStart:
                  type: string
                  format: date-time
                conditions:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
